<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Day 10 RAG Agent</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --ink: #1f2937;
      --muted: #64748b;
      --line: #d9dee7;
      --accent: #0f766e;
      --accent-dark: #115e59;
      --warn: #b45309;
      --error: #b91c1c;
      --ok: #15803d;
      --soft: #eef6f5;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
      letter-spacing: 0;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(320px, 1fr) 380px;
      gap: 0;
    }

    main {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-width: 0;
      border-right: 1px solid var(--line);
    }

    header {
      padding: 18px 24px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--warn);
      display: inline-block;
    }

    .dot.ok { background: var(--ok); }
    .dot.err { background: var(--error); }

    .messages {
      overflow: auto;
      padding: 22px 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .empty {
      align-self: center;
      max-width: 620px;
      width: 100%;
      margin-top: 8vh;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 20px;
    }

    .empty h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 999px;
      padding: 8px 11px;
      font-size: 13px;
      cursor: pointer;
    }

    .msg {
      max-width: 760px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 13px 14px;
      background: var(--panel);
      line-height: 1.48;
      white-space: pre-wrap;
    }

    .msg.user {
      align-self: flex-end;
      background: var(--soft);
      border-color: #b7d8d4;
    }

    .msg.agent {
      align-self: flex-start;
    }

    .msg.error {
      border-color: #fecaca;
      background: #fff1f2;
      color: var(--error);
    }

    .composer {
      background: var(--panel);
      border-top: 1px solid var(--line);
      padding: 16px 24px;
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      align-items: end;
    }

    textarea {
      width: 100%;
      min-height: 48px;
      max-height: 160px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      font: inherit;
      line-height: 1.4;
      outline: none;
      background: #fff;
    }

    textarea:focus, input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.12);
    }

    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 8px;
      padding: 0 14px;
      min-height: 44px;
      font: inherit;
      font-weight: 650;
      cursor: pointer;
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    button.primary:hover { background: var(--accent-dark); }
    button:disabled { opacity: 0.6; cursor: wait; }

    aside {
      background: var(--panel);
      display: grid;
      grid-template-rows: auto auto 1fr;
      min-width: 0;
    }

    .side-section {
      padding: 18px;
      border-bottom: 1px solid var(--line);
    }

    .side-section h2 {
      margin: 0 0 12px;
      font-size: 15px;
    }

    .kv {
      display: grid;
      grid-template-columns: 128px 1fr;
      gap: 8px 10px;
      font-size: 13px;
    }

    .kv span:nth-child(odd) { color: var(--muted); }
    .kv span:nth-child(even) {
      min-width: 0;
      overflow-wrap: anywhere;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .controls label {
      font-size: 13px;
      color: var(--muted);
    }

    input[type="number"] {
      width: 72px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      font: inherit;
    }

    .contexts {
      overflow: auto;
      padding: 14px 18px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .ctx {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fff;
    }

    .ctx-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    .ctx p {
      margin: 0;
      font-size: 13px;
      line-height: 1.45;
    }

    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      main { border-right: 0; }
      aside { border-top: 1px solid var(--line); min-height: 420px; }
      .composer { grid-template-columns: 1fr; }
      header { align-items: flex-start; flex-direction: column; }
      .status { white-space: normal; }
    }
  </style>
</head>
<body>
  <div class="app">
    <main>
      <header>
        <h1>Day 10 RAG Agent</h1>
        <div class="status"><span id="statusDot" class="dot"></span><span id="statusText">Đang kiểm tra</span></div>
      </header>

      <section id="messages" class="messages">
        <div id="empty" class="empty">
          <h2>Câu hỏi mẫu</h2>
          <div class="chips">
            <button class="chip" data-q="Theo chính sách hoàn tiền hiện hành, khách hàng có tối đa bao nhiêu ngày làm việc để gửi yêu cầu hoàn tiền?">Refund window</button>
            <button class="chip" data-q="VPN cho phép kết nối tối đa bao nhiêu thiết bị cùng lúc?">VPN limit</button>
            <button class="chip" data-q="Level 4 Admin Access yêu cầu phê duyệt bởi ai?">Admin access</button>
            <button class="chip" data-q="Nhân viên dưới 3 năm kinh nghiệm được bao nhiêu ngày phép năm?">HR leave</button>
          </div>
        </div>
      </section>

      <form id="composer" class="composer">
        <textarea id="question" placeholder="Nhập câu hỏi..." required></textarea>
        <button id="retrieveBtn" type="button">Retrieve</button>
        <button id="sendBtn" class="primary" type="submit">Gửi</button>
      </form>
    </main>

    <aside>
      <section class="side-section">
        <h2>Kết nối</h2>
        <div id="meta" class="kv"></div>
      </section>
      <section class="side-section">
        <h2>Truy vấn</h2>
        <div class="controls">
          <label for="topK">Top K</label>
          <input id="topK" type="number" min="1" max="10" value="5">
          <button id="clearBtn" type="button">Xóa</button>
        </div>
      </section>
      <section id="contexts" class="contexts"></section>
    </aside>
  </div>

  <script>
    const messages = document.querySelector("#messages");
    const empty = document.querySelector("#empty");
    const question = document.querySelector("#question");
    const topK = document.querySelector("#topK");
    const sendBtn = document.querySelector("#sendBtn");
    const retrieveBtn = document.querySelector("#retrieveBtn");
    const clearBtn = document.querySelector("#clearBtn");
    const contextsEl = document.querySelector("#contexts");
    const statusDot = document.querySelector("#statusDot");
    const statusText = document.querySelector("#statusText");
    const meta = document.querySelector("#meta");

    function addMessage(role, text, error = false) {
      empty.hidden = true;
      const el = document.createElement("div");
      el.className = `msg ${role}${error ? " error" : ""}`;
      el.textContent = text;
      messages.appendChild(el);
      messages.scrollTop = messages.scrollHeight;
    }

    function renderContexts(items) {
      contextsEl.innerHTML = "";
      if (!items || !items.length) {
        const blank = document.createElement("div");
        blank.className = "ctx";
        blank.innerHTML = "<p>Chưa có context.</p>";
        contextsEl.appendChild(blank);
        return;
      }
      items.forEach((item, index) => {
        const ctx = document.createElement("article");
        ctx.className = "ctx";
        const docId = item.metadata?.doc_id || "";
        const effective = item.metadata?.effective_date || "";
        ctx.innerHTML = `
          <div class="ctx-head"><span>#${index + 1} ${docId}</span><span>${effective}</span></div>
          <p></p>
        `;
        ctx.querySelector("p").textContent = item.text || "";
        contextsEl.appendChild(ctx);
      });
    }

    function setBusy(busy) {
      sendBtn.disabled = busy;
      retrieveBtn.disabled = busy;
      question.disabled = busy;
    }

    async function postJson(url, payload) {
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (!res.ok || !data.ok) throw new Error(data.error || `HTTP ${res.status}`);
      return data;
    }

    async function retrieveOnly() {
      const q = question.value.trim();
      if (!q) return;
      setBusy(true);
      try {
        const data = await postJson("/api/retrieve", { question: q, top_k: Number(topK.value || 5) });
        renderContexts(data.contexts);
      } catch (err) {
        addMessage("agent", err.message, true);
      } finally {
        setBusy(false);
      }
    }

    async function sendChat(event) {
      event.preventDefault();
      const q = question.value.trim();
      if (!q) return;
      addMessage("user", q);
      question.value = "";
      setBusy(true);
      try {
        const data = await postJson("/api/chat", { question: q, top_k: Number(topK.value || 5) });
        renderContexts(data.contexts);
        addMessage("agent", data.answer);
      } catch (err) {
        addMessage("agent", err.message, true);
      } finally {
        setBusy(false);
        question.focus();
      }
    }

    async function loadStatus() {
      try {
        const res = await fetch("/api/status");
        const data = await res.json();
        statusDot.className = `dot ${data.ok && data.openrouter_key_configured ? "ok" : "err"}`;
        statusText.textContent = data.openrouter_key_configured ? "Sẵn sàng" : "Thiếu OpenRouter key";
        const rows = [
          ["collection", data.collection],
          ["embedding", `${data.embedding_provider}:${data.embedding_model}`],
          ["ollama", data.ollama_base_url],
          ["openrouter", data.openrouter_model],
          ["key", data.openrouter_key_configured ? "configured" : "missing"]
        ];
        meta.innerHTML = rows.map(([k, v]) => `<span>${k}</span><span>${v}</span>`).join("");
      } catch (err) {
        statusDot.className = "dot err";
        statusText.textContent = "Không kết nối được server";
      }
    }

    document.querySelectorAll(".chip").forEach(btn => {
      btn.addEventListener("click", () => {
        question.value = btn.dataset.q;
        question.focus();
      });
    });
    document.querySelector("#composer").addEventListener("submit", sendChat);
    retrieveBtn.addEventListener("click", retrieveOnly);
    clearBtn.addEventListener("click", () => {
      messages.querySelectorAll(".msg").forEach(el => el.remove());
      empty.hidden = false;
      renderContexts([]);
    });
    question.addEventListener("keydown", event => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        document.querySelector("#composer").requestSubmit();
      }
    });

    renderContexts([]);
    loadStatus();
  </script>
</body>
</html>
